<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sportsbook Edge Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Sportsbook Edge Finder</h1>

  <section id="selector-panel">
    <h2>Find the best edge</h2>
    <div class="field-row">
      <label for="event-select">Event</label>
      <select id="event-select"></select>
    </div>
    <div class="field-row">
      <label for="market-select">Market</label>
      <select id="market-select"></select>
    </div>
    <div class="field-row">
      <label for="outcome-select">Outcome</label>
      <select id="outcome-select"></select>
    </div>
    <div class="field-row">
      <label for="user-prob-override">Your probability estimate (optional, 0-1)</label>
      <input type="number" id="user-prob-override" min="0" max="1" step="0.01" placeholder="leave blank to use sharp line" />
    </div>
    <div class="field-row">
      <label for="kelly-multiplier">Kelly multiplier</label>
      <select id="kelly-multiplier">
        <option value="quarter" selected>Quarter Kelly</option>
        <option value="half">Half Kelly</option>
        <option value="full">Full Kelly</option>
      </select>
    </div>
    <div class="field-row">
      <label for="bankroll">Bankroll ($)</label>
      <input type="number" id="bankroll" value="1000" min="0" step="50" />
    </div>
    <button id="analyze-btn">Find Best Edge</button>
  </section>

  <section id="results-panel">
    <div id="sharp-reference-banner"></div>
    <table id="results-table">
      <thead>
        <tr>
          <th>Book</th>
          <th>American</th>
          <th>Decimal</th>
          <th>Implied %</th>
          <th>EV</th>
          <th>Edge</th>
          <th>Full Kelly %</th>
          <th>Stake $</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
  </section>

  <section id="parlay-panel">
    <h2>DFS Correlated Parlay Calculator (2 legs)</h2>
    <div class="field-row">
      <label for="parlay-p1">Leg 1 probability (0-1)</label>
      <input type="number" id="parlay-p1" min="0" max="1" step="0.01" value="0.60" />
    </div>
    <div class="field-row">
      <label for="parlay-p2">Leg 2 probability (0-1)</label>
      <input type="number" id="parlay-p2" min="0" max="1" step="0.01" value="0.45" />
    </div>
    <div class="field-row">
      <label for="parlay-rho">Correlation estimate (rho): <span id="rho-readout">0.00</span></label>
      <input type="range" id="parlay-rho" min="-1" max="1" step="0.05" value="0" />
    </div>
    <div class="field-row">
      <label for="parlay-odds">Platform parlay decimal odds</label>
      <input type="number" id="parlay-odds" min="1.01" step="0.1" value="3.2" />
    </div>
    <button id="parlay-btn">Calculate</button>

    <table id="parlay-table">
      <thead>
        <tr>
          <th></th>
          <th>Independent (platform assumes)</th>
          <th>Correlated (your estimate)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Joint probability</td>
          <td id="parlay-prob-independent"></td>
          <td id="parlay-prob-correlated"></td>
        </tr>
        <tr>
          <td>EV at platform price</td>
          <td id="parlay-ev-independent"></td>
          <td id="parlay-ev-correlated"></td>
        </tr>
      </tbody>
    </table>
    <div id="parlay-structural-edge"></div>
  </section>

  <script src="app.js" defer></script>
</body>
</html>
